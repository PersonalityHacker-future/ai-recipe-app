[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Route all API calls through the serverless function (avoids redirect proxy timeouts)
[[redirects]]
  from = "/recipe-api/*"
  to = "/.netlify/functions/recipe-proxy"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
