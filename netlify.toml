[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/recipe-api/deepseek/*"
  to = "https://api.deepseek.com/v1/:splat"
  status = 200

[[redirects]]
  from = "/recipe-api/dashscope/*"
  to = "https://dashscope.aliyuncs.com/compatible-mode/v1/:splat"
  status = 200

[[redirects]]
  from = "/recipe-api/zhipu/*"
  to = "https://open.bigmodel.cn/api/paas/v4/:splat"
  status = 200

[[redirects]]
  from = "/recipe-api/moonshot/*"
  to = "https://api.moonshot.cn/v1/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
